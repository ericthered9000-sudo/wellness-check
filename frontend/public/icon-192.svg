  <path d="M75 35 L68 28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M117 35 L124 28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Door -->
